<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1100" preserveAspectRatio="xMidYMid slice">
    <defs>
        <pattern id="minus" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
             <rect x="11" y="13" width="6" height="2" fill="#444444"></rect>
        </pattern>
        <pattern id="plus" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
            <rect x="11" y="13" width="6" height="2" fill="#ffffff"></rect>
            <rect x="13" y="11" width="2" height="6" fill="#ffffff"></rect>
        </pattern>
    </defs>
                
    <mask id="fade">
        <rect x="0" y="0" width="1800" height="400" fill="black">
            <animate attributeName="fill" values="black; black; white; white; black" keyTimes="0; 0.5; 0.501; 0.99; 1" dur="6s" repeatCount="indefinite"></animate>
        </rect>
        <circle cx="900" cy="200" r="0" fill="white">
            <animate attributeName="r" values="0; 2000; 0; 0" keyTimes="0; 0.5; 0.501; 1" dur="6s" repeatCount="indefinite"></animate>
        </circle>
    </mask>
    <rect x="0" y="0" width="1800" height="400" fill="url(#minus)"></rect>
                
    <path d="M 320 80 l 160 0 l 0 80 l -120 0 l -200 200 l -100 0 l 0 -20 Z" fill="url(#plus)" mask="url(#fade)"></path>
    <path d="M 680 80 l 120 0 l 0 280 l -100 0 l 0 -160 l -20 0 l -160 160 l -100 0 l 0 -20 Z" fill="url(#plus)" mask="url(#fade)"></path>
    <path d="M 880 80 l 100 0 l 0 200 l 200 -200 l 120 0 l 0 180 l 40 0 l 180 -180 l 160 0 l 0 80 l -120 0 l -200 200 l -140 0 l 0 -160 l -40 0 l -160 160 l -140 0 Z" fill="url(#plus)" mask="url(#fade)"></path>
    <path d="M 1620 280 l 60 0 l 0 80 l -120 0 l 0 -20 Z" fill="url(#plus)" mask="url(#fade)"></path>
</svg>