<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 900" preserveAspectRatio="xMidYMid slice">
    <defs>
        <pattern id="minus" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
             <rect x="11" y="13" width="6" height="2" fill="#444444"></rect>
        </pattern>
        <pattern id="plus" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
            <rect x="11" y="13" width="6" height="2" fill="#ffffff"></rect>
            <rect x="13" y="11" width="2" height="6" fill="#ffffff"></rect>
        </pattern>
    </defs>
                
    <mask id="fade">
        <rect x="0" y="0" width="1800" height="900" fill="black">
            <animate attributeName="fill" values="black; black; white; white; black" keyTimes="0; 0.5; 0.501; 0.99; 1" dur="5s" repeatCount="indefinite"></animate>
        </rect>

        <circle cx="900" cy="500" r="0" fill="white">
            <animate attributeName="r" values="0; 2500; 0; 0" keyTimes="0; 0.5; 0.501; 1" dur="5s" repeatCount="indefinite"></animate>
        </circle>
    </mask>

    <rect x="0" y="0" width="1800" height="900" fill="url(#minus)"></rect>
                
    
    <path d="M 490 300 l 80 0 l 0 100 l 85 1 l 25 29 l 1 190 l -80 0 l 0 -140 l -39 0 l 0 140 l -70 0 Z" fill="url(#plus)" mask="url(#fade)"></path>
    <path d="M 820 630 l 80 0 l 0 -200 l -20 -20 l -157 0 l -20 20 l 0 169 l 30 30 l 68 0 l 0 -60 l -20 0 l 0 -80 l 40 0 Z" fill="url(#plus)" mask="url(#fade)"></path>
    <path d="M 920 300 l 80 0 l 0 320 l -80 0 Z" fill="url(#plus)" mask="url(#fade)"></path>
    <path d="M 1020 300 l 80 0 l 0 320 l -80 0 Z" fill="url(#plus)" mask="url(#fade)"></path>
    <path d="M 1240 625 l 60 -1 l 20 -20 l 0 -179 l -20 -20 l -150 0 l -20 32 l 0 169 l 23 18 l 87 1 l 0 -78 l -31 0 l 0 -63 l 31 0 Z" fill="url(#plus)" mask="url(#fade)"></path>
    
    
</svg>

